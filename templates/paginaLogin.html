<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabely</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/paginaLogin.css') }}" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Tabely</h1>
      <h2 class="subtitle">Entre com sua conta</h2>
      <input class="input-field" type="email" placeholder="E-mail" />
      <br /><br />
      <input class="input-field" type="password" placeholder="Senha" />
      <br /><br />
      <button
        class="action-button"
        type="button"
        onclick="location.href='/index'"
      >
        Fazer Login
      </button>
      <button
        class="action-button"
        type="button"
        onclick="location.href='/cadastrese'"
      >
        Crie sua conta
      </button>
      <p class="no-account-text">
        Não tem uma conta?
        <a href="/cadastrese" class="link">Cadastre-se aqui</a>
      </p>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
